const ZERO_X = 16500, ZERO_Y = 12000;
const VC_PX_MIN = 11500, VC_PX_MAX = 19500;
const VC_PY_MIN = 8000, VC_PY_MAX = 15000;
const VC_W = VC_PX_MAX - VC_PX_MIN;
const VC_H = VC_PY_MAX - VC_PY_MIN;
const container = document.getElementById('container');
const mapLayer = document.getElementById('map-layer');
const canvas = document.getElementById('landmarks-canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
canvas.width = VC_W; canvas.height = VC_H;
canvas.style.width = VC_W + 'px'; canvas.style.height = VC_H + 'px';
mapLayer.style.background = '#0f172a';
mapLayer.style.width = VC_W + 'px'; mapLayer.style.height = VC_H + 'px';
let scale = 0.12, panX = 0, panY = 0, isDragging = false, lastX, lastY;
let showNS = true, showRLX = true, maxError = 50;
function worldToCanvas(wx, wy) { return [wx + ZERO_X - VC_PX_MIN, ZERO_Y - wy - VC_PY_MIN]; }
function getVisible() {
    return LANDMARKS.filter(lm => {
        if (!showNS && lm.author === 'neutral_state') return false;
        if (!showRLX && lm.author === 'rlx') return false;
        if (maxError < 50 && lm.error_m !== null && lm.error_m > maxError) return false;
        return true;
    });
}
function drawLandmarks() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const visible = getVisible();
    const ns = visible.filter(l => l.author === 'neutral_state');
    const rlx = visible.filter(l => l.author === 'rlx');
    for (const lm of rlx) {
        const [cx, cy] = worldToCanvas(lm.x, lm.y);
        ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#475569'; ctx.fill();
        ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 0.5; ctx.stroke();
    }
    for (const lm of ns) {
        const [cx, cy] = worldToCanvas(lm.x, lm.y);
        ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI * 2);
        ctx.fillStyle = '#16a34a'; ctx.fill();
        ctx.strokeStyle = '#4ade80'; ctx.lineWidth = 1; ctx.stroke();
    }
    document.getElementById('ns-count').textContent = ns.length;
    document.getElementById('rlx-count').textContent = rlx.length;
    document.getElementById('count-info').textContent = visible.length + ' / ' + LANDMARKS.length + ' landmarks';
}
function applyTransform() { mapLayer.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + scale + ')'; }
function centerOnVC() {
    const vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / VC_W, vh / VC_H) * 0.9;
    panX = (vw - VC_W * scale) / 2; panY = (vh - VC_H * scale) / 2;
    applyTransform();
}
container.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = container.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    const newScale = Math.max(0.05, Math.min(5, scale * factor));
    panX = mx - (mx - panX) * (newScale / scale);
    panY = my - (my - panY) * (newScale / scale);
    scale = newScale; applyTransform();
}, { passive: false });
container.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; container.classList.add('grabbing'); });
window.addEventListener('mousemove', e => {
    if (isDragging) { panX += e.clientX - lastX; panY += e.clientY - lastY; lastX = e.clientX; lastY = e.clientY; applyTransform(); }
    const rect = container.getBoundingClientRect();
    const mx = (e.clientX - rect.left - panX) / scale;
    const my = (e.clientY - rect.top - panY) / scale;
    const visible = getVisible();
    let closest = null, minDist = Infinity;
    const threshold = 12 / scale;
    for (const lm of visible) {
        const [cx, cy] = worldToCanvas(lm.x, lm.y);
        const dist = Math.sqrt((cx-mx)**2 + (cy-my)**2);
        if (dist < threshold && dist < minDist) { minDist = dist; closest = lm; }
    }
    if (closest) {
        const ac = closest.author === 'neutral_state' ? 'author-ns' : 'author-rlx';
        const err = closest.error_m !== null ? closest.error_m.toFixed(3) + 'm' : 'N/A';
        const cams = closest.source_cameras.length ? closest.source_cameras.join(' + ') : 'N/A';
        tooltip.innerHTML = '<div class="name">' + closest.name + '</div><div class="' + ac + '">' + closest.author + '</div><div class="coords">xyz: (' + closest.x.toFixed(1) + ', ' + closest.y.toFixed(1) + ', ' + closest.z.toFixed(1) + ')</div><div class="error">error: ' + err + '</div><div class="cams">src: ' + cams + '</div>';
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top = (e.clientY - 10) + 'px';
    } else { tooltip.style.display = 'none'; }
});
window.addEventListener('mouseup', () => { isDragging = false; container.classList.remove('grabbing'); });
container.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
document.getElementById('show-ns').addEventListener('change', e => { showNS = e.target.checked; drawLandmarks(); });
document.getElementById('show-rlx').addEventListener('change', e => { showRLX = e.target.checked; drawLandmarks(); });
document.getElementById('max-error').addEventListener('input', e => {
    maxError = parseInt(e.target.value);
    document.getElementById('max-error-val').textContent = maxError >= 50 ? 'all' : maxError + 'm';
    drawLandmarks();
});
centerOnVC(); drawLandmarks();
</script>
